<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kevin Chase Claypool | Portfolio</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #111827;
      --muted: #667085;
      --accent: #1f4f8f;
      --border: #e4e7ec;
      --shadow: 0 10px 30px rgba(16, 24, 40, 0.06);
      --radius: 18px;
      --max: 1080px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .hero {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero-resume-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2.1rem, 4vw, 3.4rem);
      margin-bottom: 6px;
    }

    .headline {
      font-size: 1.1rem;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text);
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .button {
      text-decoration: none;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .section {
      margin-top: 30px;
    }

    .section-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    iframe, video {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
    }

    .note {
      margin-top: 10px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">

    <section class="hero">
      <h1>Kevin Chase Claypool</h1>

      <!-- FIXED: Resume buttons directly under title -->
      <div class="hero-resume-actions">
        <button class="button preview-button" data-pdf="assets/Kevin Claypool Resume July 2025.pdf">Preview Resume</button>
        <a class="button" href="assets/Kevin Claypool Resume July 2025.pdf" target="_blank">Download Resume</a>
      </div>

      <div class="headline">Electromechanical Design | Electrical Engineer</div>
      <p class="subtitle">Landing page with direct access to project demos, CAD work, and PCB design.</p>
    </section>

    <section class="section" id="competition-video">
      <div class="section-card">
        <h2>Competition Run</h2>
        <iframe src="https://www.youtube.com/embed/jFPaF9YfIjM"></iframe>
      </div>
    </section>

    <section class="section" id="scara-video">
      <div class="section-card">
        <h2>SCARA Videos</h2>
        <iframe src="https://www.youtube.com/embed/ozlDDVAi7mo"></iframe>
        <iframe src="https://www.youtube.com/embed/sFqKUF_yAus"></iframe>
      </div>
    </section>

    <!-- FIXED: MOVED HERE directly under SCARA -->
    <section class="section" id="local-demo">
      <div class="section-card">
        <h2>Axial Pulse Motor Control System</h2>
        <video controls>
          <source src="assets/PXL_20250501_201354126.mp4" type="video/mp4" />
        </video>
      </div>
    </section>

    <section class="section" id="board-files">
      <div class="section-card">
        <h2>Board Design Files</h2>
        <p class="subtitle">Designed in KiCad using two-plane milling workflow.</p>
      </div>
    </section>

  </div>
</body>
</html>
