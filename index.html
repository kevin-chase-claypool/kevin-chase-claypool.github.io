    </p>

    <div class="grid">

      <article class="card">
        <h3>Motion Demonstration</h3>
        <iframe src="https://www.youtube.com/embed/ozlDDVAi7mo" allowfullscreen></iframe>
        <p>Motion demonstration of the SCARA system.</p>

      <article class="card">
        <h3>Research Presentation</h3>

    </div>
  </div>
